<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Garage SaaS Login</title>

<style>
body {
  background:#000;
  color:#FFD700;
  font-family:sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box {
  border:1px solid gold;
  padding:30px;
  border-radius:10px;
  width:300px;
  background:#111;
}

input {
  width:100%;
  padding:10px;
  margin:10px 0;
  border:none;
  border-radius:5px;
}

button {
  width:100%;
  padding:10px;
  background:gold;
  border:none;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="box">

<h2>🚗 Garage SaaS</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<input id="garageName" placeholder="ชื่ออู่ (สมัครใหม่)">

<button onclick="register()">สมัคร</button>
<button onclick="login()">เข้าสู่ระบบ</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getAuth, createUserWithEmailAndPassword,
signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore, addDoc, collection, query,
where, getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* 🔥 ใส่ config */
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);


// ================= REGISTER =================
window.register = async () => {

  const user = await createUserWithEmailAndPassword(
    auth,
    email.value,
    password.value
  );

  // สร้าง tenant
  const tenant = await addDoc(collection(db,"tenants"),{
    name: garageName.value,
    owner: user.user.uid,
    created: new Date()
  });

  // เก็บ tenantId
  localStorage.setItem("tenantId", tenant.id);

  alert("สมัครสำเร็จ");

  location.href = "index.html"; // ไป dashboard
};


// ================= LOGIN =================
window.login = async () => {

  const user = await signInWithEmailAndPassword(
    auth,
    email.value,
    password.value
  );

  // หา tenant ของ user
  const q = query(
    collection(db,"tenants"),
    where("owner","==",user.user.uid)
  );

  const snap = await getDocs(q);

  snap.forEach(d=>{
    localStorage.setItem("tenantId", d.id);
  });

  location.href = "index.html";
};

</script>

</body>
</html>
