<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>NISA AUTO LOGIN</title>
</head>
<body style="font-family:sans-serif; padding:20px">

  <h2>🚗 NISA AUTO SYSTEM</h2>

  <!-- LOGIN -->
  <h3>Login</h3>
  <input id="email" placeholder="Email"><br><br>
  <input id="password" type="password" placeholder="Password"><br><br>
  <button onclick="login()">Login</button>
  <button onclick="register()">สมัคร</button>

  <hr>

  <!-- USER INFO -->
  <h3>👤 User</h3>
  <div id="userInfo">ยังไม่ login</div>

  <hr>

  <button onclick="logout()">Logout</button>

  <script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    import {
      getFirestore,
      doc,
      setDoc,
      getDoc
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // 🔥 YOUR CONFIG
    const firebaseConfig = {
      apiKey: "AIzaSyDAfm7eDJPFiWrUK_U0aqS7yl2Wt_PpjmA",
      authDomain: "garage-system-41587.firebaseapp.com",
      projectId: "garage-system-41587",
      storageBucket: "garage-system-41587.firebasestorage.app",
      messagingSenderId: "688480145767",
      appId: "1:688480145767:web:f457e635675df0cbd91fc2",
      measurementId: "G-X8ZYNK9JRS"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // REGISTER
    window.register = async function () {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      const userCred = await createUserWithEmailAndPassword(auth, email, password);
      const user = userCred.user;

      // 🔥 สร้าง user ใน Firestore
      await setDoc(doc(db, "users", user.uid), {
        email: user.email,
        role: "customer", // เปลี่ยนเป็น admin ได้ทีหลัง
        createdAt: Date.now()
      });

      alert("สมัครสำเร็จ");
    };

    // LOGIN
    window.login = async function () {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      await signInWithEmailAndPassword(auth, email, password);
    };

    // LOGOUT
    window.logout = async function () {
      await signOut(auth);
    };

    // CHECK LOGIN
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        const docRef = doc(db, "users", user.uid);
        const docSnap = await getDoc(docRef);

        let role = "unknown";
        if (docSnap.exists()) {
          role = docSnap.data().role;
        }

        document.getElementById("userInfo").innerHTML = `
          UID: ${user.uid}<br>
          Email: ${user.email}<br>
          Role: ${role}
        `;

        // 🔥 ตรงนี้คือจุดแยกหน้า
        if (role === "admin") {
          console.log("ไปหน้า Admin");
        } else {
          console.log("ไปหน้า ลูกค้า");
        }

      } else {
        document.getElementById("userInfo").innerHTML = "ยังไม่ login";
      }
    });

  </script>

</body>
</html>
