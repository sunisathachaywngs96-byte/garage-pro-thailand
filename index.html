<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Garage Pro</title>

<style>
body {
  font-family: sans-serif;
  padding:20px;
  background: #0f0f0f; /* ดำเข้ม */
  color: #f5d27a; /* ทอง */
}

h2, h3 {
  color: #d4af37; /* ทองหรู */
}

.card {
  background: linear-gradient(145deg, #1a1a1a, #111);
  padding:15px;
  margin:10px 0;
  border-radius:12px;
  border: 1px solid #d4af37;
  box-shadow: 0 0 10px rgba(212,175,55,0.2);
}

input {
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:1px solid #444;
  background:#0f0f0f;
  color:#f5d27a;
}

input::placeholder {
  color:#888;
}

/* ปุ่มหลัก */
button {
  padding:8px 12px;
  margin:3px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

/* ปุ่มเพิ่มงาน */
button[onclick="addJob()"] {
  background: linear-gradient(45deg,#d4af37,#b8962e);
  color:black;
}

/* ปุ่มสถานะ */
.waiting {
  background: #b8860b;
  color:black;
}

.fixing {
  background: #1e90ff;
  color:white;
}

.done {
  background: #2ecc71;
  color:black;
}

.delete {
  background: #c0392b;
  color:white;
}

<body>

<h2>🚗 Garage Pro</h2>

<!-- ➕ เพิ่มงาน -->
<div class="card">
  <input id="car" placeholder="รถ">
  <input id="name" placeholder="ลูกค้า">
  <input id="phone" placeholder="โทร">
  <input id="problem" placeholder="ปัญหา">
  <input id="price" type="number" placeholder="ราคา">
  <button onclick="addJob()">เพิ่มงาน</button>
</div>

<h3>📋 รายการงาน</h3>
<div id="list">กำลังโหลด...</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  query,
  orderBy,
  onSnapshot,
  doc,
  updateDoc,
  deleteDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔥 ใส่ของจริง
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "garage-system-41587"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const tenantId = "tenant_001";
const listBox = document.getElementById("list");

// ✅ เพิ่มงาน (มี error log)
window.addJob = async () => {
  try {
    const data = {
      car: document.getElementById("car").value || "-",
      customerName: document.getElementById("name").value || "-",
      phone: document.getElementById("phone").value || "-",
      problem: document.getElementById("problem").value || "-",
      price: Number(document.getElementById("price").value || 0),
      status: "waiting",
      createdAt: serverTimestamp()
    };

    console.log("กำลังเพิ่ม:", data);

    await addDoc(collection(db, "tenants", tenantId, "jobs"), data);

    alert("✅ เพิ่มงานสำเร็จ");

  } catch (err) {
    console.error("ERROR:", err);
    alert("❌ เพิ่มไม่สำเร็จ: " + err.message);
  }
};

// 🔄 realtime
const q = query(
  collection(db, "tenants", tenantId, "jobs"),
  orderBy("createdAt", "desc")
);

onSnapshot(q, (snapshot) => {
  listBox.innerHTML = "";

  if (snapshot.empty) {
    listBox.innerHTML = "ไม่มีข้อมูล";
    return;
  }

  snapshot.forEach((docSnap) => {
    const d = docSnap.data();
    const id = docSnap.id;

    listBox.innerHTML += `
      <div class="card">
        🚗 ${d.car ?? "-"} <br>
        👤 ${d.customerName ?? "-"} <br>
        📞 ${d.phone ?? "-"} <br>
        🛠 ${d.problem ?? "-"} <br>
        💰 ${d.price ?? 0} <br>
        📊 <b>${d.status ?? "waiting"}</b><br><br>

        <button class="waiting" onclick="setStatus('${id}','waiting')">รอ</button>
        <button class="fixing" onclick="setStatus('${id}','fixing')">กำลังซ่อม</button>
        <button class="done" onclick="setStatus('${id}','done')">เสร็จ</button>
        <button class="delete" onclick="del('${id}')">ลบ</button>
      </div>
    `;
  });
});

// 🟢 เปลี่ยนสถานะ
window.setStatus = async (id, status) => {
  try {
    await updateDoc(doc(db, "tenants", tenantId, "jobs", id), { status });
  } catch (e) {
    alert("error: " + e.message);
  }
};

// 🗑 ลบ
window.del = async (id) => {
  if (!confirm("ลบงานนี้?")) return;
  try {
    await deleteDoc(doc(db, "tenants", tenantId, "jobs", id));
  } catch (e) {
    alert("error: " + e.message);
  }
};

</script>

</body>
</html>
