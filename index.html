<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>NISA AUTO SYSTEM</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, query, where, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "garage-system-41587.firebaseapp.com",
  projectId: "garage-system-41587"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

window.login = async function () {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("pass").value;

  await signInWithEmailAndPassword(auth, email, pass);
};

onAuthStateChanged(auth, async (user) => {
  if (!user) return;

  const userDoc = await getDoc(doc(db, "users", user.uid));
  const role = userDoc.data().role;

  if (role === "admin") {
    document.getElementById("adminPanel").style.display = "block";
    loadAllJobs();
  } else {
    document.getElementById("customerPanel").style.display = "block";
    loadMyCar(user.uid);
  }
});

async function loadMyCar(uid) {
  const q = query(collection(db, "customers"), where("userId", "==", uid));
  const snapshot = await getDocs(q);

  let html = "";
  snapshot.forEach(doc => {
    const d = doc.data();
    html += `
      <div style="background:#111;color:#0f0;padding:10px;margin:10px">
        🚗 ${d.car} (${d.plate}) <br>
        สถานะ: ${d.status}
      </div>
    `;
  });

  document.getElementById("mycar").innerHTML = html;
}

async function loadAllJobs() {
  const snapshot = await getDocs(collection(db, "customers"));

  let html = "";
  snapshot.forEach(doc => {
    const d = doc.data();
    html += `
      <div style="background:#222;color:#fff;padding:10px;margin:10px">
        👤 ${d.name} - ${d.car} <br>
        สถานะ: ${d.status}
      </div>
    `;
  });

  document.getElementById("adminJobs").innerHTML = html;
}

</script>
</head>

<body style="font-family:sans-serif;background:#eee">

<h1>NISA AUTO SYSTEM</h1>

<input id="email" placeholder="Email">
<input id="pass" placeholder="Password" type="password">
<button onclick="login()">Login</button>

<hr>

<div id="adminPanel" style="display:none">
  <h2>🔧 Admin Dashboard</h2>
  <div id="adminJobs"></div>
</div>

<div id="customerPanel" style="display:none">
  <h2>🚗 รถของฉัน</h2>
  <div id="mycar"></div>
</div>

</body>
</html>
