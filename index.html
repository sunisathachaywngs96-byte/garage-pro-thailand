<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Garage Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: sans-serif;
      background: #f2f2f2;
      margin: 0;
    }

    header {
      background: linear-gradient(90deg,#ff6a00,#ff3c00);
      color: white;
      padding: 20px;
      font-size: 22px;
      font-weight: bold;
    }

    .container {
      padding: 15px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 15px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }

    .btn-add {
      background: #ff3c00;
      width: 100%;
    }

    .btn {
      margin: 5px 3px;
      font-size: 12px;
    }

    .wait { background: orange; }
    .fix { background: blue; }
    .done { background: green; }
    .del { background: red; }
  </style>
</head>

<body>

<header>🚗 Garage Pro</header>

<div class="container">

  <div class="card">
    <input id="car" placeholder="รถ">
    <input id="customer" placeholder="ลูกค้า">
    <input id="phone" placeholder="เบอร์">
    <input id="problem" placeholder="ปัญหา">
    <input id="price" placeholder="ราคา">
    <button class="btn-add" onclick="addJob()">+ เพิ่มงาน</button>
  </div>

  <div id="jobs"></div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

  import {
    getFirestore,
    collection,
    addDoc,
    onSnapshot,
    orderBy,
    query,
    serverTimestamp,
    updateDoc,
    deleteDoc,
    doc
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  // 🔥 ใส่ของคุณตรงนี้
  const firebaseConfig = {
    apiKey: "ใส่ของคุณ",
    authDomain: "ใส่ของคุณ",
    projectId: "ใส่ของคุณ",
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const col = collection(db, "jobs");

  // ✅ เพิ่มงาน (แก้แล้ว ใช้งานได้ชัวร์)
  window.addJob = async () => {
    try {
      await addDoc(col, {
        car: document.getElementById("car").value || "-",
        customerName: document.getElementById("customer").value || "-",
        phone: document.getElementById("phone").value || "-",
        problem: document.getElementById("problem").value || "-",
        price: Number(document.getElementById("price").value) || 0,
        status: "waiting",
        createdAt: serverTimestamp()
      });

      // clear input
      document.querySelectorAll("input").forEach(i => i.value = "");

    } catch (e) {
      alert("ERROR: " + e.message);
      console.error(e);
    }
  };

  // 🔄 realtime
  onSnapshot(query(col, orderBy("createdAt","desc")), (snap) => {
    const box = document.getElementById("jobs");
    box.innerHTML = "";

    snap.forEach(d => {
      const data = d.data();

      box.innerHTML += `
        <div class="card">
          🚗 ${data.car} <br>
          👤 ${data.customerName} <br>
          📞 ${data.phone} <br>
          🔧 ${data.problem} <br>
          💰 ${data.price} <br>
          📊 <b>${data.status}</b><br>

          <button class="btn wait" onclick="setStatus('${d.id}','waiting')">รอ</button>
          <button class="btn fix" onclick="setStatus('${d.id}','fixing')">กำลังซ่อม</button>
          <button class="btn done" onclick="setStatus('${d.id}','done')">เสร็จ</button>
          <button class="btn del" onclick="delJob('${d.id}')">ลบ</button>
        </div>
      `;
    });
  });

  // 🔁 เปลี่ยนสถานะ
  window.setStatus = async (id, status) => {
    await updateDoc(doc(db, "jobs", id), { status });
  };

  // 🗑 ลบ
  window.delJob = async (id) => {
    if(confirm("ลบจริง?")){
      await deleteDoc(doc(db, "jobs", id));
    }
  };

</script>

</body>
</html>
