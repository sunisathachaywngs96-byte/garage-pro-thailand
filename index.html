<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>NISA AUTO SYSTEM PRO</title>
</head>

<body>
  <h1>🚗 NISA AUTO SYSTEM PRO</h1>

  <h2>Login</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>

  <hr>

  <h2>ข้อมูลลูกค้า</h2>
  <div id="data"></div>

  <script type="module">

    // 🔥 Firebase SDK
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // 🔥 config ของคุณ (ที่แคปมา)
    const firebaseConfig = {
      apiKey: "ใส่ของคุณ",
      authDomain: "garage-system-41587.firebaseapp.com",
      projectId: "garage-system-41587",
      storageBucket: "garage-system-41587.appspot.com",
      messagingSenderId: "688480145767",
      appId: "1:688480145767:web:xxxxxxxx"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // 🔥 LOGIN
    window.login = async () => {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      try {
        await signInWithEmailAndPassword(auth, email, password);
        alert("✅ Login สำเร็จ");
        loadData();
      } catch (err) {
        alert("❌ " + err.message);
      }
    };

    // 🔥 ดึงข้อมูล Firestore
    async function loadData() {
      const querySnapshot = await getDocs(collection(db, "customers"));
      let html = "";

      querySnapshot.forEach((doc) => {
        const d = doc.data();
        html += `
          <div style="border:1px solid #ccc; padding:10px; margin:10px;">
            <b>${d.name}</b><br>
            📞 ${d.Phone}<br>
            🚗 ${d.Car}<br>
            🔢 ${d.plate}<br>
            📌 ${d.status}
          </div>
        `;
      });

      document.getElementById("data").innerHTML = html;
    }

  </script>
</body>
</html>
