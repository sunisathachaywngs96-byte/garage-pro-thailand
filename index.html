<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Auto Expert</title>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#0d1117;
  --card:#161b22;
  --card2:#1c2230;
  --border:#30363d;
  --green:#22c55e;
  --blue:#3b82f6;
  --yellow:#eab308;
  --text:#f0f6fc;
  --sub:#8b949e;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'IBM Plex Sans Thai',sans-serif;
  background:var(--bg);
  color:var(--text);
  padding:20px;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.title{
  font-size:28px;
  font-weight:700;
}

.top-actions{
  display:flex;
  gap:10px;
}

.btn{
  border:none;
  border-radius:10px;
  padding:10px 16px;
  cursor:pointer;
  font-weight:600;
}

.btn-green{
  background:var(--green);
  color:#000;
}

.btn-blue{
  background:var(--blue);
  color:#fff;
}

.grid{
  display:grid;
  grid-template-columns:320px 1fr;
  gap:20px;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:20px;
}

.section-title{
  font-size:18px;
  font-weight:700;
  margin-bottom:14px;
}

.car-card{
  background:var(--card2);
  border:1px solid var(--border);
  border-radius:14px;
  padding:14px;
  margin-bottom:12px;
}

.car-name{
  font-size:18px;
  font-weight:700;
}

.car-plate{
  color:var(--sub);
  margin-top:4px;
}

.car-mile{
  margin-top:8px;
  color:var(--green);
  font-weight:600;
}

.car-actions{
  display:flex;
  gap:8px;
  margin-top:12px;
}

.small-btn{
  flex:1;
  border:none;
  padding:8px;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
}

.select-btn{
  background:rgba(34,197,94,.15);
  color:var(--green);
}

.delete-btn{
  background:rgba(239,68,68,.15);
  color:#ef4444;
}

.main-car{
  background:linear-gradient(135deg,#1c2230,#1a2535);
  border-radius:20px;
  padding:24px;
  border:1px solid var(--border);
  margin-bottom:20px;
}

.main-car-name{
  font-size:30px;
  font-weight:700;
}

.main-car-plate{
  margin-top:8px;
  display:inline-block;
  background:rgba(59,130,246,.15);
  color:var(--blue);
  padding:6px 14px;
  border-radius:8px;
}

.stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;
  margin-top:20px;
}

.stat{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:16px;
}

.stat-label{
  color:var(--sub);
  font-size:13px;
}

.stat-value{
  font-size:26px;
  font-weight:700;
  margin-top:8px;
}

.repair-item{
  background:var(--card2);
  border:1px solid var(--border);
  border-radius:14px;
  padding:14px;
  margin-bottom:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.repair-name{
  font-weight:700;
}

.repair-sub{
  color:var(--sub);
  margin-top:4px;
  font-size:13px;
}

.repair-price{
  color:var(--green);
  font-size:22px;
  font-weight:700;
}

.modal-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.7);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.modal-overlay.open{
  display:flex;
}

.modal{
  width:90%;
  max-width:420px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:18px;
  padding:24px;
}

.modal-title{
  font-size:22px;
  font-weight:700;
  margin-bottom:20px;
}

.input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid var(--border);
  background:var(--card2);
  color:var(--text);
  margin-bottom:12px;
}

.full-btn{
  width:100%;
  border:none;
  border-radius:10px;
  padding:12px;
  background:var(--green);
  color:#000;
  font-weight:700;
  cursor:pointer;
}

.close-btn{
  margin-top:10px;
  width:100%;
  border:none;
  border-radius:10px;
  padding:12px;
  background:#2d333b;
  color:#fff;
  cursor:pointer;
}

.empty{
  text-align:center;
  color:var(--sub);
  padding:30px;
}

@media(max-width:900px){

  .grid{
    grid-template-columns:1fr;
  }

  .stats{
    grid-template-columns:1fr;
  }

}

</style>
</head>

<body>

<div class="topbar">

  <div class="title">
    🚘 Auto Expert
  </div>

  <div class="top-actions">

    <button class="btn btn-green" onclick="openCarModal()">
      + เพิ่มรถ
    </button>

    <button class="btn btn-blue" onclick="openRepairModal()">
      + เพิ่มงานซ่อม
    </button>

  </div>

</div>

<div class="grid">

  <!-- LEFT -->
  <div class="card">

    <div class="section-title">
      รถของฉัน
    </div>

    <div id="carList"></div>

  </div>

  <!-- RIGHT -->
  <div>

    <div class="main-car">

      <div class="main-car-name car-model">
        ยังไม่มีรถ
      </div>

      <div class="main-car-plate plate-tag">
        กรุณาเพิ่มรถ
      </div>

      <div class="stats">

        <div class="stat">
          <div class="stat-label">
            เลขไมล์
          </div>

          <div class="stat-value" id="mainMileage">
            0
          </div>
        </div>

        <div class="stat">
          <div class="stat-label">
            จำนวนงานซ่อม
          </div>

          <div class="stat-value" id="repairCount">
            0
          </div>
        </div>

        <div class="stat">
          <div class="stat-label">
            ค่าใช้จ่ายรวม
          </div>

          <div class="stat-value" id="totalCost">
            0
          </div>
        </div>

      </div>

    </div>

    <div class="card">

      <div class="section-title">
        ประวัติการซ่อม
      </div>

      <div id="repairList">

        <div class="empty">
          ยังไม่มีข้อมูล
        </div>

      </div>

    </div>

  </div>

</div>

<!-- MODAL CAR -->

<div class="modal-overlay" id="carModal">

  <div class="modal">

    <div class="modal-title">
      เพิ่มรถ
    </div>

    <input
      id="carName"
      class="input"
      placeholder="ชื่อรถ"
    />

    <input
      id="plate"
      class="input"
      placeholder="ทะเบียน"
    />

    <input
      id="mileage"
      class="input"
      placeholder="เลขไมล์"
      type="number"
    />

    <button class="full-btn" onclick="saveCar()">
      บันทึกรถ
    </button>

    <button class="close-btn" onclick="closeCarModal()">
      ปิด
    </button>

  </div>

</div>

<!-- MODAL REPAIR -->

<div class="modal-overlay" id="repairModal">

  <div class="modal">

    <div class="modal-title">
      เพิ่มงานซ่อม
    </div>

    <input
      id="repairTitle"
      class="input"
      placeholder="รายการซ่อม"
    />

    <input
      id="repairPrice"
      class="input"
      placeholder="ราคา"
      type="number"
    />

    <input
      id="repairMileage"
      class="input"
      placeholder="เลขไมล์"
      type="number"
    />

    <button class="full-btn" onclick="saveRepair()">
      บันทึกงานซ่อม
    </button>

    <button class="close-btn" onclick="closeRepairModal()">
      ปิด
    </button>

  </div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  deleteDoc,
  doc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

  apiKey: "AIzaSyDAfm7eDJPFiWrUK_U0aqS7yl2Wt_PpjmA",

  authDomain: "garage-system-41587.firebaseapp.com",

  projectId: "garage-system-41587",

  storageBucket: "garage-system-41587.firebasestorage.app",

  messagingSenderId: "688480145767",

  appId: "1:688480145767:web:9bfba3df045ca434d91fc2"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

let selectedCarId = null;

// =====================
// เปิดปิด Modal
// =====================

window.openCarModal = function(){

  document
    .getElementById("carModal")
    .classList.add("open");

};

window.closeCarModal = function(){

  document
    .getElementById("carModal")
    .classList.remove("open");

};

window.openRepairModal = function(){

  if(!selectedCarId){

    alert("กรุณาเลือกรถก่อน");
    return;

  }

  document
    .getElementById("repairModal")
    .classList.add("open");

};

window.closeRepairModal = function(){

  document
    .getElementById("repairModal")
    .classList.remove("open");

};

// =====================
// เพิ่มรถ
// =====================

window.saveCar = async function(){

  const carName =
    document.getElementById("carName").value;

  const plate =
    document.getElementById("plate").value;

  const mileage =
    document.getElementById("mileage").value;

  if(!carName || !plate){

    alert("กรอกข้อมูลให้ครบ");
    return;

  }

  await addDoc(

    collection(
      db,
      "users",
      "user_001",
      "cars"
    ),

    {
      carName,
      plate,
      mileage,
      createdAt: Date.now()
    }

  );

  closeCarModal();

  document.getElementById("carName").value = "";
  document.getElementById("plate").value = "";
  document.getElementById("mileage").value = "";

  alert("เพิ่มรถสำเร็จ");

};

// =====================
// โหลดรถ realtime
// =====================

onSnapshot(

  collection(db, "users", "user_001", "cars"),

  (snapshot)=>{

    const carList =
      document.getElementById("carList");

    carList.innerHTML = "";

    snapshot.forEach((docSnap)=>{

      const d = docSnap.data();
      const id = docSnap.id;

      if(!selectedCarId){

        selectedCar(id, d);

      }

      carList.innerHTML += `

      <div class="car-card">

        <div class="car-name">
          ${d.carName}
        </div>

        <div class="car-plate">
          🚘 ${d.plate}
        </div>

        <div class="car-mile">
          ${d.mileage || 0} กม.
        </div>

        <div class="car-actions">

          <button
            class="small-btn select-btn"
            onclick='selectedCar(
              "${id}",
              ${JSON.stringify(d)}
            )'
          >
            เลือก
          </button>

          <button
            class="small-btn delete-btn"
            onclick='deleteCar("${id}")'
          >
            ลบ
          </button>

        </div>

      </div>

      `;

    });

  }

);

// =====================
// เลือกรถ
// =====================

window.selectedCar = function(id, d){

  selectedCarId = id;

  document.querySelector(".car-model").innerText =
    d.carName;

  document.querySelector(".plate-tag").innerText =
    "🚘 " + d.plate;

  document.getElementById("mainMileage").innerText =
    d.mileage || 0;

  loadRepairs(id);

};

// =====================
// ลบรถ
// =====================

window.deleteCar = async function(id){

  const ok =
    confirm("ลบรถคันนี้ ?");

  if(!ok) return;

  await deleteDoc(

    doc(
      db,
      "users",
      "user_001",
      "cars",
      id
    )

  );

  alert("ลบแล้ว");

};

// =====================
// เพิ่มงานซ่อม
// =====================

window.saveRepair = async function(){

  if(!selectedCarId){

    alert("กรุณาเลือกรถ");
    return;

  }

  const title =
    document.getElementById("repairTitle").value;

  const price =
    document.getElementById("repairPrice").value;

  const mileage =
    document.getElementById("repairMileage").value;

  if(!title){

    alert("กรอกข้อมูล");
    return;

  }

  await addDoc(

    collection(
      db,
      "users",
      "user_001",
      "cars",
      selectedCarId,
      "repairs"
    ),

    {
      title,
      price:Number(price || 0),
      mileage:Number(mileage || 0),
      createdAt: Date.now()
    }

  );

  document.getElementById("repairTitle").value = "";
  document.getElementById("repairPrice").value = "";
  document.getElementById("repairMileage").value = "";

  closeRepairModal();

  alert("บันทึกงานซ่อมแล้ว");

};

// =====================
// โหลดงานซ่อม
// =====================

function loadRepairs(carId){

  onSnapshot(

    collection(
      db,
      "users",
      "user_001",
      "cars",
      carId,
      "repairs"
    ),

    (snapshot)=>{

      const repairList =
        document.getElementById("repairList");

      repairList.innerHTML = "";

      let total = 0;
      let count = 0;

      snapshot.forEach((docSnap)=>{

        const d = docSnap.data();

        total += Number(d.price || 0);

        count++;

        repairList.innerHTML += `

        <div class="repair-item">

          <div>

            <div class="repair-name">
              ${d.title}
            </div>

            <div class="repair-sub">
              ${d.mileage} กม.
            </div>

          </div>

          <div class="repair-price">
            ${d.price}
          </div>

        </div>

        `;

      });

      if(count === 0){

        repairList.innerHTML = `
          <div class="empty">
            ยังไม่มีประวัติซ่อม
          </div>
        `;

      }

      document.getElementById("repairCount").innerText =
        count;

      document.getElementById("totalCost").innerText =
        total;

    }

  );

}

</script>

</body>
</html>
