<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Garage Pro</title>

<style>
body { font-family: sans-serif; padding:20px; background:#f5f5f5; }
.card {
  background: back;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
}
button {
  padding:6px 10px;
  margin:3px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
.waiting { background:orange; color:white; }
.fixing { background:blue; color:white; }
.done { background:green; color:white; }
.delete { background:red; color:white; }
</style>
</head>

<body>

<h2>🚗 Garage Pro</h2>

<!-- ➕ เพิ่มงาน -->
<div class="card">
  <input id="car" placeholder="รถ">
  <input id="name" placeholder="ลูกค้า">
  <input id="phone" placeholder="โทร">
  <input id="problem" placeholder="ปัญหา">
  <input id="price" type="number" placeholder="ราคา">
  <button onclick="addJob()">เพิ่มงาน</button>
</div>

<h3>📋 รายการงาน</h3>
<div id="list">กำลังโหลด...</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  query,
  orderBy,
  onSnapshot,
  doc,
  updateDoc,
  deleteDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔥 ใส่ของจริง
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "garage-system-41587"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const tenantId = "tenant_001";
const listBox = document.getElementById("list");

// ✅ เพิ่มงาน (มี error log)
window.addJob = async () => {
  try {
    const data = {
      car: document.getElementById("car").value || "-",
      customerName: document.getElementById("name").value || "-",
      phone: document.getElementById("phone").value || "-",
      problem: document.getElementById("problem").value || "-",
      price: Number(document.getElementById("price").value || 0),
      status: "waiting",
      createdAt: serverTimestamp()
    };

    console.log("กำลังเพิ่ม:", data);

    await addDoc(collection(db, "tenants", tenantId, "jobs"), data);

    alert("✅ เพิ่มงานสำเร็จ");

  } catch (err) {
    console.error("ERROR:", err);
    alert("❌ เพิ่มไม่สำเร็จ: " + err.message);
  }
};

// 🔄 realtime
const q = query(
  collection(db, "tenants", tenantId, "jobs"),
  orderBy("createdAt", "desc")
);

onSnapshot(q, (snapshot) => {
  listBox.innerHTML = "";

  if (snapshot.empty) {
    listBox.innerHTML = "ไม่มีข้อมูล";
    return;
  }

  snapshot.forEach((docSnap) => {
    const d = docSnap.data();
    const id = docSnap.id;

    listBox.innerHTML += `
      <div class="card">
        🚗 ${d.car ?? "-"} <br>
        👤 ${d.customerName ?? "-"} <br>
        📞 ${d.phone ?? "-"} <br>
        🛠 ${d.problem ?? "-"} <br>
        💰 ${d.price ?? 0} <br>
        📊 <b>${d.status ?? "waiting"}</b><br><br>

        <button class="waiting" onclick="setStatus('${id}','waiting')">รอ</button>
        <button class="fixing" onclick="setStatus('${id}','fixing')">กำลังซ่อม</button>
        <button class="done" onclick="setStatus('${id}','done')">เสร็จ</button>
        <button class="delete" onclick="del('${id}')">ลบ</button>
      </div>
    `;
  });
});

// 🟢 เปลี่ยนสถานะ
window.setStatus = async (id, status) => {
  try {
    await updateDoc(doc(db, "tenants", tenantId, "jobs", id), { status });
  } catch (e) {
    alert("error: " + e.message);
  }
};

// 🗑 ลบ
window.del = async (id) => {
  if (!confirm("ลบงานนี้?")) return;
  try {
    await deleteDoc(doc(db, "tenants", tenantId, "jobs", id));
  } catch (e) {
    alert("error: " + e.message);
  }
};

</script>

</body>
</html>
