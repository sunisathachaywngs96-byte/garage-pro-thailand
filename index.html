<!DOCTYPE html>
<html>
<head>
  <title>NISA AUTO SaaS</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<h1>🚗 NISA AUTO SYSTEM</h1>

<!-- LOGIN -->
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="register()">สมัคร</button>
<button onclick="login()">Login</button>

<hr>

<!-- DASHBOARD -->
<button onclick="loadDashboard()">📊 Dashboard</button>
<button onclick="loadJobs()">🚗 งาน</button>
<button onclick="loadCustomers()">👤 ลูกค้า</button>
<button onclick="backup()">💾 Backup</button>

<div id="app"></div>

<canvas id="chart"></canvas>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔥 ใส่ config ของคุณ
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth();

// 🔐 LOGIN
window.register = async ()=>{
  await createUserWithEmailAndPassword(auth,email.value,password.value);
  alert("สมัครสำเร็จ");
}

window.login = async ()=>{
  await signInWithEmailAndPassword(auth,email.value,password.value);
  alert("เข้าแล้ว");
}

// 🚗 JOB
window.addJob = async ()=>{
  await addDoc(collection(db,"jobs"),{
    car:"Toyota",
    status:"รอซ่อม",
    createdAt: Date.now()
  });
}

// 📊 DASHBOARD
window.loadDashboard = async ()=>{

  const snap = await getDocs(collection(db,"payments"));

  let total = 0;

  snap.forEach(doc=>{
    total += doc.data().total || 0;
  });

  document.getElementById("app").innerHTML =
    "💰 รายได้รวม: " + total;

}

// 👤 CUSTOMERS
window.loadCustomers = async ()=>{
  const snap = await getDocs(collection(db,"customers"));

  let html = "";

  snap.forEach(doc=>{
    html += `<div>${doc.data().name}</div>`;
  });

  document.getElementById("app").innerHTML = html;
}

// 💾 BACKUP
window.backup = async ()=>{

  const snap = await getDocs(collection(db,"jobs"));

  let data = [];

  snap.forEach(doc=>{
    data.push(doc.data());
  });

  const blob = new Blob([JSON.stringify(data)],{type:"application/json"});
  const a = document.createElement("a");

  a.href = URL.createObjectURL(blob);
  a.download = "backup.json";
  a.click();
}

// 📈 CHART
window.loadChart = async ()=>{

  const snap = await getDocs(collection(db,"payments"));

  let data = [];

  snap.forEach(doc=>{
    data.push(doc.data().total);
  });

  new Chart(document.getElementById("chart"),{
    type:"line",
    data:{
      labels:data.map((_,i)=>i),
      datasets:[{data}]
    }
  });
}

</script>

</body>
</html>
