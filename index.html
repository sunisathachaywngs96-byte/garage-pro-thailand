<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Garage System</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    .card {
      border: 1px solid #ccc;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 10px;
    }
    button {
      margin: 5px;
      padding: 6px 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    .waiting { background: orange; color: white; }
    .fixing { background: blue; color: white; }
    .done { background: green; color: white; }
    .delete { background: red; color: white; }
  </style>
</head>
<body>

<h2>📋 รายการงานซ่อม (Realtime)</h2>

<div id="app">กำลังโหลด...</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  query,
  orderBy,
  limit,
  onSnapshot,
  doc,
  updateDoc,
  deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔥 ใส่ config ของคุณ
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "garage-system-41587"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const box = document.getElementById("app");

// 🎯 query เอา “งานล่าสุด”
const q = query(
  collection(db, "tenants", "tenant_001", "jobs"),
  orderBy("createdAt", "desc"),
  limit(1)
);

// 🔄 realtime listener
onSnapshot(q, (snapshot) => {
  box.innerHTML = "";

  if (snapshot.empty) {
    box.innerHTML = "ไม่มีข้อมูล";
    return;
  }

  snapshot.forEach((docSnap) => {
    const data = docSnap.data();
    const id = docSnap.id;

    box.innerHTML += `
      <div class="card">
        🚗 รถ: ${data.car ?? "-"} <br>
        👤 ลูกค้า: ${data.customerName ?? "-"} <br>
        📞 โทร: ${data.phone ?? "-"} <br>
        🛠 ปัญหา: ${data.problem ?? "-"} <br>
        💰 ราคา: ${data.price ?? 0} <br>
        📊 สถานะ: <b>${data.status ?? "waiting"}</b> <br><br>

        <button class="waiting" onclick="updateStatus('${id}','waiting')">รอ</button>
        <button class="fixing" onclick="updateStatus('${id}','fixing')">กำลังซ่อม</button>
        <button class="done" onclick="updateStatus('${id}','done')">เสร็จแล้ว</button>

        <button class="delete" onclick="deleteJob('${id}')">ลบ</button>
      </div>
    `;
  });
});

// 🟢 เปลี่ยนสถานะ
window.updateStatus = async (id, status) => {
  const ref = doc(db, "tenants", "tenant_001", "jobs", id);
  await updateDoc(ref, { status });
};

// 🗑 ลบงาน
window.deleteJob = async (id) => {
  if (!confirm("ลบงานนี้?")) return;
  const ref = doc(db, "tenants", "tenant_001", "jobs", id);
  await deleteDoc(ref);
};

</script>

</body>
</html>
