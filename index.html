<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Garage Pro (เทพ)</title>

<style>
body { font-family: sans-serif; padding:20px; background:#f5f5f5; }
h2 { margin-top:30px; }

.card {
  background:white;
  padding:15px;
  margin-bottom:10px;
  border-radius:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

input, select {
  padding:8px;
  margin:5px;
  border-radius:6px;
  border:1px solid #ccc;
}

button {
  padding:6px 10px;
  margin:3px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.waiting { background:orange; color:white; }
.fixing { background:blue; color:white; }
.done { background:green; color:white; }
.delete { background:red; color:white; }

.dashboard {
  background:black;
  color:white;
  padding:15px;
  border-radius:10px;
}
</style>
</head>

<body>

<h1>🚗 Garage Pro (ระบบอู่ขั้นเทพ)</h1>

<!-- 📊 Dashboard -->
<div class="dashboard">
  💰 รายได้รวม: <span id="total">0</span> บาท
</div>

<!-- ➕ เพิ่มงาน -->
<h2>➕ เพิ่มงานซ่อม</h2>
<div class="card">
  <input id="car" placeholder="รถ">
  <input id="name" placeholder="ลูกค้า">
  <input id="phone" placeholder="โทร">
  <input id="problem" placeholder="ปัญหา">
  <input id="price" type="number" placeholder="ราคา">
  <button onclick="addJob()">เพิ่มงาน</button>
</div>

<!-- 🎯 งานล่าสุด -->
<h2>🔥 งานล่าสุด</h2>
<div id="latest"></div>

<!-- 📋 งานทั้งหมด -->
<h2>📋 งานทั้งหมด</h2>
<div id="list"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  query,
  orderBy,
  onSnapshot,
  doc,
  updateDoc,
  deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔥 แก้เป็นของคุณ
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "garage-system-41587"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🧠 tenant (รองรับหลายอู่)
const tenantId = "tenant_001";

const latestBox = document.getElementById("latest");
const listBox = document.getElementById("list");
const totalBox = document.getElementById("total");

// ➕ เพิ่มงาน
window.addJob = async () => {
  await addDoc(collection(db, "tenants", tenantId, "jobs"), {
    car: car.value,
    customerName: name.value,
    phone: phone.value,
    problem: problem.value,
    price: Number(price.value || 0),
    status: "waiting",
    createdAt: new Date()
  });

  // clear input
  car.value = name.value = phone.value = problem.value = price.value = "";
};

// 🔄 realtime ดึงข้อมูลทั้งหมด
const q = query(
  collection(db, "tenants", tenantId, "jobs"),
  orderBy("createdAt", "desc")
);

onSnapshot(q, (snapshot) => {
  latestBox.innerHTML = "";
  listBox.innerHTML = "";
  let total = 0;

  snapshot.forEach((docSnap, index) => {
    const data = docSnap.data();
    const id = docSnap.id;

    total += Number(data.price || 0);

    const html = `
      <div class="card">
        🚗 ${data.car ?? "-"} <br>
        👤 ${data.customerName ?? "-"} <br>
        📞 ${data.phone ?? "-"} <br>
        🛠 ${data.problem ?? "-"} <br>
        💰 ${data.price ?? 0} <br>
        📊 <b>${data.status ?? "waiting"}</b><br><br>

        <button class="waiting" onclick="setStatus('${id}','waiting')">รอ</button>
        <button class="fixing" onclick="setStatus('${id}','fixing')">กำลังซ่อม</button>
        <button class="done" onclick="setStatus('${id}','done')">เสร็จ</button>
        <button class="delete" onclick="del('${id}')">ลบ</button>
      </div>
    `;

    // 🔥 ตัวแรก = งานล่าสุด
    if (index === 0) {
      latestBox.innerHTML = html;
    }

    listBox.innerHTML += html;
  });

  totalBox.innerText = total;
});

// 🟢 เปลี่ยนสถานะ
window.setStatus = async (id, status) => {
  await updateDoc(doc(db, "tenants", tenantId, "jobs", id), { status });
};

// 🗑 ลบ
window.del = async (id) => {
  if (!confirm("ลบงานนี้?")) return;
  await deleteDoc(doc(db, "tenants", tenantId, "jobs", id));
};

</script>

</body>
</html>
