<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Garage Pro SaaS</title>

<style>
body { font-family: sans-serif; background:#f5f5f5; padding:15px; }
.card { background:white; padding:15px; margin:10px 0; border-radius:12px; }
input { width:100%; padding:8px; margin:5px 0; }
button { padding:8px; margin:3px; border:none; border-radius:6px; cursor:pointer; }

.waiting { background:orange; color:white; }
.fixing { background:blue; color:white; }
.done { background:green; color:white; }
.delete { background:red; color:white; }

.header {
  font-size:20px;
  margin-bottom:10px;
}
.stat {
  background:black;
  color:#00ffcc;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="header">🚗 Garage Pro (SaaS)</div>

<div class="stat">💰 รายได้รวม: <span id="total">0</span> บาท</div>

<div class="card">
  <input id="car" placeholder="รถ">
  <input id="name" placeholder="ลูกค้า">
  <input id="phone" placeholder="โทร">
  <input id="problem" placeholder="ปัญหา">
  <input id="price" type="number" placeholder="ราคา">
  <button onclick="addJob()">+ เพิ่มงาน</button>
</div>

<div id="list">โหลดข้อมูล...</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  query,
  orderBy,
  onSnapshot,
  doc,
  updateDoc,
  deleteDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔥 ใส่ของจริงจาก Firebase Console
const firebaseConfig = {
  apiKey: "ใส่ของจริง",
  authDomain: "ใส่ของจริง",
  projectId: "garage-system-41587"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const tenantId = "tenant_001";

const listBox = document.getElementById("list");
const totalBox = document.getElementById("total");

// ✅ เพิ่มงาน
window.addJob = async () => {
  const car = carInput.value.trim();
  const name = nameInput.value.trim();

  if (!car || !name) {
    alert("❗ กรุณากรอกข้อมูลให้ครบ");
    return;
  }

  try {
    await addDoc(collection(db, "tenants", tenantId, "jobs"), {
      car,
      customerName: name,
      phone: phoneInput.value || "-",
      problem: problemInput.value || "-",
      price: Number(priceInput.value || 0),
      status: "waiting",
      createdAt: serverTimestamp()
    });

    clearForm();

  } catch (err) {
    alert("❌ ERROR: " + err.message);
    console.error(err);
  }
};

// clear form
function clearForm(){
  document.querySelectorAll("input").forEach(i => i.value="");
}

// 🔄 realtime + คำนวณรายได้
const q = query(
  collection(db, "tenants", tenantId, "jobs"),
  orderBy("createdAt","desc")
);

onSnapshot(q, (snap) => {
  listBox.innerHTML = "";

  let total = 0;

  if (snap.empty) {
    listBox.innerHTML = "ไม่มีงาน";
    return;
  }

  snap.forEach(docSnap => {
    const d = docSnap.data();
    const id = docSnap.id;

    if (d.status === "done") total += d.price || 0;

    listBox.innerHTML += `
      <div class="card">
        🚗 ${d.car}<br>
        👤 ${d.customerName}<br>
        📞 ${d.phone}<br>
        🔧 ${d.problem}<br>
        💰 ${d.price}<br>
        📊 <b>${d.status}</b><br><br>

        <button class="waiting" onclick="setStatus('${id}','waiting')">รอ</button>
        <button class="fixing" onclick="setStatus('${id}','fixing')">กำลังซ่อม</button>
        <button class="done" onclick="setStatus('${id}','done')">เสร็จ</button>
        <button class="delete" onclick="delJob('${id}')">ลบ</button>
      </div>
    `;
  });

  totalBox.innerText = total;
});

// 🟢 เปลี่ยนสถานะ
window.setStatus = async (id, status) => {
  await updateDoc(doc(db,"tenants",tenantId,"jobs",id), { status });
};

// 🗑 ลบ
window.delJob = async (id) => {
  if (!confirm("ลบจริง?")) return;
  await deleteDoc(doc(db,"tenants",tenantId,"jobs",id));
};

</script>

</body>
</html>
