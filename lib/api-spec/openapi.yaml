openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Car Service Dashboard API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: customers
    description: Customer operations
  - name: vehicles
    description: Vehicle operations
  - name: appointments
    description: Appointment operations
  - name: services
    description: Service type operations
  - name: technicians
    description: Technician operations
  - name: dashboard
    description: Dashboard summary operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /customers:
    get:
      operationId: listCustomers
      tags: [customers]
      summary: List all customers
      parameters:
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Customer"
    post:
      operationId: createCustomer
      tags: [customers]
      summary: Create a customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustomerBody"
      responses:
        "201":
          description: Created customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  /customers/{id}:
    get:
      operationId: getCustomer
      tags: [customers]
      summary: Get a customer by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
    put:
      operationId: updateCustomer
      tags: [customers]
      summary: Update a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustomerBody"
      responses:
        "200":
          description: Updated customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
    delete:
      operationId: deleteCustomer
      tags: [customers]
      summary: Delete a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /vehicles:
    get:
      operationId: listVehicles
      tags: [vehicles]
      summary: List all vehicles
      parameters:
        - name: customerId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of vehicles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Vehicle"
    post:
      operationId: createVehicle
      tags: [vehicles]
      summary: Create a vehicle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVehicleBody"
      responses:
        "201":
          description: Created vehicle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vehicle"

  /vehicles/{id}:
    get:
      operationId: getVehicle
      tags: [vehicles]
      summary: Get a vehicle by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Vehicle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vehicle"
    put:
      operationId: updateVehicle
      tags: [vehicles]
      summary: Update a vehicle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVehicleBody"
      responses:
        "200":
          description: Updated vehicle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vehicle"

  /appointments:
    get:
      operationId: listAppointments
      tags: [appointments]
      summary: List all appointments
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [scheduled, in_progress, completed, cancelled]
        - name: date
          in: query
          schema:
            type: string
        - name: technicianId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of appointments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Appointment"
    post:
      operationId: createAppointment
      tags: [appointments]
      summary: Create an appointment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAppointmentBody"
      responses:
        "201":
          description: Created appointment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"

  /appointments/{id}:
    get:
      operationId: getAppointment
      tags: [appointments]
      summary: Get an appointment by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Appointment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
    put:
      operationId: updateAppointment
      tags: [appointments]
      summary: Update an appointment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAppointmentBody"
      responses:
        "200":
          description: Updated appointment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
    delete:
      operationId: deleteAppointment
      tags: [appointments]
      summary: Cancel an appointment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Cancelled

  /services:
    get:
      operationId: listServices
      tags: [services]
      summary: List all service types
      responses:
        "200":
          description: List of services
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Service"
    post:
      operationId: createService
      tags: [services]
      summary: Create a service type
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateServiceBody"
      responses:
        "201":
          description: Created service
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"

  /services/{id}:
    put:
      operationId: updateService
      tags: [services]
      summary: Update a service type
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateServiceBody"
      responses:
        "200":
          description: Updated service
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"
    delete:
      operationId: deleteService
      tags: [services]
      summary: Delete a service type
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /technicians:
    get:
      operationId: listTechnicians
      tags: [technicians]
      summary: List all technicians
      responses:
        "200":
          description: List of technicians
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Technician"
    post:
      operationId: createTechnician
      tags: [technicians]
      summary: Create a technician
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTechnicianBody"
      responses:
        "201":
          description: Created technician
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Technician"

  /technicians/{id}:
    put:
      operationId: updateTechnician
      tags: [technicians]
      summary: Update a technician
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTechnicianBody"
      responses:
        "200":
          description: Updated technician
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Technician"
    delete:
      operationId: deleteTechnician
      tags: [technicians]
      summary: Delete a technician
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard KPI summary
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent appointment activity feed
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /dashboard/service-breakdown:
    get:
      operationId: getServiceBreakdown
      tags: [dashboard]
      summary: Get appointment counts by service type
      responses:
        "200":
          description: Service breakdown
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ServiceBreakdownItem"

  /dashboard/revenue-by-month:
    get:
      operationId: getRevenueByMonth
      tags: [dashboard]
      summary: Get revenue totals by month for the past 6 months
      responses:
        "200":
          description: Monthly revenue
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MonthlyRevenue"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Customer:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        createdAt:
          type: string
      required: [id, name, email, phone, createdAt]

    CreateCustomerBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: string
      required: [name, email, phone]

    Vehicle:
      type: object
      properties:
        id:
          type: integer
        customerId:
          type: integer
        customerName:
          type: string
        make:
          type: string
        model:
          type: string
        year:
          type: integer
        licensePlate:
          type: string
        color:
          type: string
        mileage:
          type: integer
      required: [id, customerId, customerName, make, model, year, licensePlate, color, mileage]

    CreateVehicleBody:
      type: object
      properties:
        customerId:
          type: integer
        make:
          type: string
        model:
          type: string
        year:
          type: integer
        licensePlate:
          type: string
        color:
          type: string
        mileage:
          type: integer
      required: [customerId, make, model, year, licensePlate, color, mileage]

    Service:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        price:
          type: number
        estimatedDurationMinutes:
          type: integer
      required: [id, name, description, price, estimatedDurationMinutes]

    CreateServiceBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
        estimatedDurationMinutes:
          type: integer
      required: [name, description, price, estimatedDurationMinutes]

    Technician:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        specialty:
          type: string
        phone:
          type: string
        isAvailable:
          type: boolean
      required: [id, name, specialty, phone, isAvailable]

    CreateTechnicianBody:
      type: object
      properties:
        name:
          type: string
        specialty:
          type: string
        phone:
          type: string
        isAvailable:
          type: boolean
      required: [name, specialty, phone, isAvailable]

    Appointment:
      type: object
      properties:
        id:
          type: integer
        customerId:
          type: integer
        customerName:
          type: string
        vehicleId:
          type: integer
        vehicleDescription:
          type: string
        serviceId:
          type: integer
        serviceName:
          type: string
        technicianId:
          type: integer
        technicianName:
          type: string
        scheduledAt:
          type: string
        status:
          type: string
          enum: [scheduled, in_progress, completed, cancelled]
        notes:
          type: string
        totalCost:
          type: number
      required: [id, customerId, customerName, vehicleId, vehicleDescription, serviceId, serviceName, technicianId, technicianName, scheduledAt, status, totalCost]

    CreateAppointmentBody:
      type: object
      properties:
        customerId:
          type: integer
        vehicleId:
          type: integer
        serviceId:
          type: integer
        technicianId:
          type: integer
        scheduledAt:
          type: string
        notes:
          type: string
      required: [customerId, vehicleId, serviceId, technicianId, scheduledAt]

    UpdateAppointmentBody:
      type: object
      properties:
        technicianId:
          type: integer
        scheduledAt:
          type: string
        status:
          type: string
          enum: [scheduled, in_progress, completed, cancelled]
        notes:
          type: string
      required: [status]

    DashboardSummary:
      type: object
      properties:
        todayAppointments:
          type: integer
        inProgressCount:
          type: integer
        completedToday:
          type: integer
        totalCustomers:
          type: integer
        totalVehicles:
          type: integer
        monthlyRevenue:
          type: number
        availableTechnicians:
          type: integer
      required: [todayAppointments, inProgressCount, completedToday, totalCustomers, totalVehicles, monthlyRevenue, availableTechnicians]

    ActivityItem:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [appointment_created, status_changed, customer_added, vehicle_added]
        description:
          type: string
        timestamp:
          type: string
        customerName:
          type: string
      required: [id, type, description, timestamp, customerName]

    ServiceBreakdownItem:
      type: object
      properties:
        serviceName:
          type: string
        count:
          type: integer
        revenue:
          type: number
      required: [serviceName, count, revenue]

    MonthlyRevenue:
      type: object
      properties:
        month:
          type: string
        revenue:
          type: number
        appointmentCount:
          type: integer
      required: [month, revenue, appointmentCount]
